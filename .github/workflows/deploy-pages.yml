name: Deploy TOPDOWN CITY to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Reject repo root index.html
        run: |
          if [ -f index.html ]; then
            echo "::error::Root index.html breaks Actions-only Pages deploy. See AGENTS.md"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Smoke check before deploy
        working-directory: cursor/topdown-city
        run: npm run check

      - name: Prepare site artifact
        run: |
          SITE=cursor/topdown-city
          echo "{\"gta2\":true,\"sprites\":\"relative\",\"source\":\"main\",\"deploy\":\"actions\"}" > "$SITE/version.json"
          touch "$SITE/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cursor/topdown-city

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
      actions: read
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live site
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "Deployed to: $URL"
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "::warning::Live URL still not HTTP 200 after deploy (may need a few more minutes)"
