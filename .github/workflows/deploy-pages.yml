name: Deploy TOPDOWN CITY to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cursor/topdown-city/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate GTA2 pedestrian assets
        run: |
          curl -fsSL -o /tmp/bil.sty "https://maseuko.pl/soft/styjs/bil.sty"
          cd cursor/topdown-city
          npm ci
          pip install pillow
          npm run gen:gta2

      - name: Prepare site artifact
        run: |
          SITE=cursor/topdown-city
          echo "{\"build\":\"2026062720\",\"people\":10,\"style\":\"gta2\",\"sprites\":\"relative\",\"source\":\"main\"}" > "$SITE/version.json"
          touch "$SITE/.nojekyll"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cursor/topdown-city

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
