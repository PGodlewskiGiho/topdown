name: Deploy TOPDOWN CITY to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Block forbidden root index.html
        run: |
          if [ -f index.html ]; then
            echo "::error::Root index.html must not exist. See AGENTS.md"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Smoke check before deploy
        working-directory: cursor/topdown-city
        run: npm run check

      - name: Prepare site artifact
        run: |
          SITE=cursor/topdown-city
          echo "{\"gta2\":true,\"sprites\":\"relative\",\"source\":\"main\"}" > "$SITE/version.json"
          touch "$SITE/.nojekyll"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cursor/topdown-city

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
