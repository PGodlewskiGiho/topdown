name: Sync gh-pages branch (live site)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Copy game from main (before switching branches)
        run: |
          cp -a cursor/topdown-city/. /tmp/topdown-game/
          echo "{\"build\":\"$(date -u +%Y%m%d%H%M)\",\"people\":9,\"gta2\":true,\"sprites\":\"lazy\",\"assets\":\"2026062315\"}" > /tmp/topdown-game/version.json
          touch /tmp/topdown-game/.nojekyll

      - name: Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          git checkout -B gh-pages origin/gh-pages 2>/dev/null || git checkout --orphan gh-pages
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a /tmp/topdown-game/. .
          git add -A
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Auto-sync from main $(git rev-parse --short HEAD)"
          git push origin gh-pages
