<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>GTA2 — podgląd postaci (płeć / waga)</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;padding:24px;background:#121018;color:#e8e4dc;font-family:system-ui,sans-serif}
  h1{font-size:1.25rem;margin:0 0 8px}
  p{color:#9a94a8;font-size:.9rem;margin:0 0 20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  figure{margin:0;padding:12px;background:#1a1622;border:1px solid #2a2438;border-radius:10px;text-align:center}
  figure img{image-rendering:pixelated;image-rendering:crisp-edges;max-width:100%;height:auto}
  figcaption{margin-top:8px;font-size:.75rem;color:#b8b0c4;line-height:1.4}
  a{color:#7fe0a8}
</style>
</head>
<body>
<h1>GTA2 — ciała: męskie · żeńskie · krzepkie</h1>
<p>Każda karta = 16 klatek (8 kierunków × 2). W grze waga (<code>build</code>) skaluje sylwetkę w runtime.</p>
<div class="grid" id="grid"></div>
<p style="margin-top:24px"><a href="assets/people/topdown/previews/male_blue_jeans.png">male_blue_jeans.png (8 kierunków)</a></p>
<script>
const combos=[
  {id:"male_blue_jeans", label:"Męska · niebieska koszula · jeans"},
  {id:"female_skirt_red", label:"Żeńska · biała koszula · czerwona spódnica"},
  {id:"hardy_brown_jeans", label:"Krzepka · brązowa koszula · jeans"},
  {id:"female_yellow_shorts", label:"Żeńska · żółta koszula · szorty"},
  {id:"male_grey_jeans", label:"Męska · szara koszula · ciemne jeansy"},
  {id:"hardy_red_jeans", label:"Krzepka · czerwona koszula · jeans"},
];
const grid=document.getElementById("grid");
const base="assets/people/topdown/previews/";
for(const c of combos){
  const fig=document.createElement("figure");
  fig.innerHTML=`<img src="${base}${c.id}.png" alt=""><figcaption>${c.label}</figcaption>`;
  grid.appendChild(fig);
}
</script>
</body>
</html>
