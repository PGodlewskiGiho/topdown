<!DOCTYPE html>
<html lang="pl"><head>
<meta charset="utf-8"><title>Tree preview — TOPDOWN CITY</title>
<style>
  body { margin:0; background:#1a2418; color:#c8dcc0; font:14px/1.4 monospace; }
  header { padding:16px 20px; border-bottom:1px solid #2a4030; }
  h1 { margin:0 0 6px; font-size:18px; font-weight:600; }
  p { margin:0; opacity:.75; max-width:720px; }
  .grid { display:flex; flex-wrap:wrap; gap:28px; padding:24px; justify-content:center; }
  figure { margin:0; text-align:center; background:#0e160c; border:1px solid #2a4030; border-radius:8px; padding:16px; }
  figure img { image-rendering: pixelated; image-rendering: crisp-edges; width:192px; height:256px; }
  figcaption { margin-top:10px; letter-spacing:.06em; text-transform:uppercase; font-size:12px; }
</style></head><body>
<header>
  <h1>Podgląd drzew (v3 — połączony pień z koroną)</h1>
  <p>Korona nachodzi na pień (pień + brązowy klin pod spodem, potem liście). Poprzednia wersja miała przerwę, bo klastry były za wysoko, a pień rysowany <em>po</em> koronie. Folder: <strong>assets/trees-preview/</strong> — gra bez zmian.</p>
</header>
<div class="grid">
    <figure><img src="assets/trees-preview/deciduous.png" alt="deciduous"><figcaption>deciduous</figcaption></figure>
    <figure><img src="assets/trees-preview/oak.png" alt="oak"><figcaption>oak</figcaption></figure>
    <figure><img src="assets/trees-preview/birch.png" alt="birch"><figcaption>birch</figcaption></figure>
    <figure><img src="assets/trees-preview/pine.png" alt="pine"><figcaption>pine</figcaption></figure>
    <figure><img src="assets/trees-preview/bush.png" alt="bush"><figcaption>bush</figcaption></figure>
</div>
</body></html>
