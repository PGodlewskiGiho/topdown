<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Prototyp drzewa — Chrono Trigger style</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { background: #1a1a22; color: #ccc; font: 14px/1.4 system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 16px; gap: 12px; }
  h1 { font-size: 16px; font-weight: 600; color: #8ecf68; }
  p { max-width: 640px; text-align: center; color: #888; font-size: 13px; }
  canvas { image-rendering: pixelated; border: 2px solid #333; border-radius: 4px; cursor: crosshair; }
  .btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  button { background: #2a3a28; color: #b8e868; border: 1px solid #486838; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  button:hover { background: #384838; }
  button.active { background: #486838; color: #fff; }
</style>
</head>
<body>
<h1>PROTOTYP DRZEWA — styl Chrono Trigger</h1>
<p>Jedno ręcznie zaprojektowane drzewo liściaste. Kliknij tło, żeby przesunąć kamerę. Przełącz dzień/noc/deszcz.</p>
<canvas id="cv"></canvas>
<div class="btns">
  <button id="bDay" class="active">Dzień</button>
  <button id="bNight">Noc</button>
  <button id="bRain">Deszcz</button>
  <button id="bReset">Reset kamery</button>
</div>
<script>
"use strict";
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const PX = 2;
const W = 640, H = 480;
cv.width = W / PX; cv.height = H / PX;
cv.style.width = W + "px"; cv.style.height = H + "px";
ctx.setTransform(1 / PX, 0, 0, 1 / PX, 0, 0);
ctx.imageSmoothingEnabled = false;

const qs = new URLSearchParams(location.search);
const cam = { x: 320, y: 310 };
let mode = qs.get("mode") || "day";
let rain = mode === "rain";

// SNES Chrono Trigger–inspired 6-step green ramp
const PAL = {
  spec: "#c8f078",
  hi:   "#98d058",
  h:    "#68a838",
  l:    "#488828",
  m:    "#306818",
  d:    "#1a4010",
  rim:  "#0c2808",
  sh:   "#061806",
};
const TRUNK = { l: "#9a7848", m: "#6a5030", d: "#3a2818" };

// Fixed prototype tree — Chrono Trigger sphere-clump layout (hand-tuned)
const TREE = {
  x: 320, y: 340, s: 110, H: 72, crownR: 46,
  kind: "deciduous_v2",
  trunk: { tw: 9, frac: 0.58 },
  // Hand-placed Chrono Trigger sphere-clumps (back → front draw order)
  clumps: [
    { ox: -0.34, oy:  0.14, rx: 0.36, ry: 0.30, z: 0 },
    { ox:  0.32, oy:  0.10, rx: 0.34, ry: 0.28, z: 0 },
    { ox: -0.10, oy: -0.22, rx: 0.44, ry: 0.36, z: 1 },
    { ox:  0.14, oy: -0.06, rx: 0.30, ry: 0.26, z: 2 },
    { ox: -0.22, oy:  0.02, rx: 0.28, ry: 0.24, z: 2 },
  ],
};

function treeLean(t) {
  const H = t.H, offx = t.x - cam.x;
  const vyBase = -H * 0.92;
  const par = Math.tanh(offx / 900) * H * 0.22;
  let vx = par, vy = vyBase - H * 0.06 * Math.tanh((t.y - cam.y) / 1100);
  const vl = Math.hypot(vx, vy), vm = H * 1.9;
  if (vl > vm) { vx *= vm / vl; vy *= vm / vl; }
  return [vx, vy];
}

function fillPoly(pts) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath(); ctx.fill();
}

function tintPal(pal, mul) {
  if (mul >= 1) return pal;
  const f = (hex, m) => {
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    const c = v => Math.max(0, Math.min(255, (v * m) | 0));
    return "#" + [c(r), c(g), c(b)].map(v => v.toString(16).padStart(2, "0")).join("");
  };
  return { spec: f(pal.spec, mul), hi: f(pal.hi, mul), h: f(pal.h, mul), l: f(pal.l, mul),
           m: f(pal.m, mul), d: f(pal.d, mul), rim: f(pal.rim, mul), sh: f(pal.sh, mul) };
}

function drawGrass() {
  const pal = mode === "night" ? ["#1a3018", "#223820", "#2a4028"] : ["#3a6838", "#488848", "#589858"];
  ctx.fillStyle = pal[0];
  ctx.fillRect(0, 0, W, H);
  for (let y = 0; y < H; y += 8)
    for (let x = 0; x < W; x += 8) {
      const h = ((x * 7 + y * 13) >>> 0) % 100;
      ctx.fillStyle = h < 40 ? pal[1] : (h < 70 ? pal[2] : pal[0]);
      ctx.fillRect(x, y, 8, 8);
    }
}

function drawTrunk(t) {
  const tr = t.trunk, [vx, vy] = treeLean(t);
  const hw = tr.tw * 0.5, thw = hw * 0.74;
  const bx = t.x, by = t.y, tx = t.x + vx * tr.frac, ty = t.y + vy * tr.frac;
  const palMul = mode === "night" ? 0.65 : 1;
  const tp = { l: tintPal({ spec: TRUNK.l }, palMul).spec, m: tintPal({ spec: TRUNK.m }, palMul).spec, d: tintPal({ spec: TRUNK.d }, palMul).spec };

  ctx.fillStyle = mode === "night" ? "rgba(0,0,0,.35)" : "rgba(0,0,0,.22)";
  ctx.beginPath();
  ctx.ellipse(bx + 2, by + 3, hw * 1.6, hw * 0.55, 0, 0, 7);
  ctx.fill();

  ctx.fillStyle = tp.m; fillPoly([[bx - hw, by], [bx + hw, by], [tx + thw, ty], [tx - thw, ty]]);
  ctx.fillStyle = tp.d; fillPoly([[bx - hw, by], [tx - thw, ty], [tx - thw + tr.tw * 0.28, ty], [bx - hw + tr.tw * 0.30, by]]);
  ctx.fillStyle = tp.l; fillPoly([[bx + hw, by], [tx + thw, ty], [tx + thw - tr.tw * 0.22, ty], [bx + hw - tr.tw * 0.24, by]]);
}

// One Chrono Trigger foliage clump: ordered cel-shading bands, no flat fill
function drawClump(cx, cy, rx, ry, pal, z) {
  const lit = z >= 1;

  // SE cast shadow (grounding)
  ctx.fillStyle = pal.sh;
  ctx.beginPath();
  ctx.ellipse(cx + rx * 0.14, cy + ry * 0.18, rx * 1.06, ry * 0.62, 0.15, 0, 7);
  ctx.fill();

  // Bottom-right shadow mass
  ctx.fillStyle = pal.d;
  ctx.beginPath();
  ctx.ellipse(cx + rx * 0.10, cy + ry * 0.08, rx * 0.96, ry * 0.72, 0.12, 0, 7);
  ctx.fill();

  // Main body
  ctx.fillStyle = lit ? pal.l : pal.m;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, 7);
  ctx.fill();

  // Lower shadow crescent (SE quadrant)
  ctx.fillStyle = pal.d;
  ctx.beginPath();
  ctx.ellipse(cx + rx * 0.18, cy + ry * 0.14, rx * 0.62, ry * 0.38, 0.3, 0, Math.PI);
  ctx.fill();

  // Mid-tone band (horizontal CT-style stripe)
  ctx.fillStyle = pal.h;
  ctx.beginPath();
  ctx.ellipse(cx - rx * 0.06, cy - ry * 0.08, rx * 0.72, ry * 0.22, -0.1, 0, 7);
  ctx.fill();

  // NW highlight cap
  ctx.fillStyle = pal.hi;
  ctx.beginPath();
  ctx.ellipse(cx - rx * 0.24, cy - ry * 0.26, rx * 0.44, ry * 0.30, -0.2, 0, 7);
  ctx.fill();

  // Specular spot
  ctx.fillStyle = pal.spec;
  ctx.beginPath();
  ctx.arc(cx - rx * 0.18, cy - ry * 0.32, Math.max(2, rx * 0.10), 0, 7);
  ctx.fill();

  // Leaf-edge bumps along top arc (ordered, not random)
  const bumps = 5;
  for (let i = 0; i < bumps; i++) {
    const a = -Math.PI * 0.92 + (i / (bumps - 1)) * Math.PI * 0.84;
    const bx = cx + Math.cos(a) * rx * 0.88;
    const by = cy + Math.sin(a) * ry * 0.62;
    const br = rx * 0.13;
    ctx.fillStyle = pal.l;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, 7); ctx.fill();
    ctx.fillStyle = pal.hi;
    ctx.beginPath(); ctx.arc(bx - 1.5, by - 2, br * 0.55, 0, 7); ctx.fill();
    ctx.fillStyle = pal.rim;
    ctx.beginPath(); ctx.arc(bx + 1, by + 1.5, br * 0.35, 0, 7); ctx.fill();
  }
}

// Dark crevice between overlapping clumps
function drawCrevice(cx, cy, rx, ry, pal) {
  ctx.fillStyle = pal.sh;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx * 0.55, ry * 0.35, 0, 0, 7);
  ctx.fill();
}

function drawCanopyV2(t) {
  const [vx, vy] = treeLean(t);
  const ax = t.x + vx, ay = t.y + vy, R = t.crownR;
  const pal = tintPal(PAL, mode === "night" ? 0.72 : (mode === "rain" ? 0.82 : 1));

  const clumps = t.clumps.slice().sort((a, b) => a.z - b.z);

  // Inter-lobe crevices (draw first, behind clumps)
  for (const c of clumps) {
    if (c.z === 0) {
      drawCrevice(ax + c.ox * R, ay + c.oy * R, c.rx * R, c.ry * R, pal);
    }
  }

  // Clumps back → front
  for (const c of clumps) {
    drawClump(ax + c.ox * R, ay + c.oy * R, c.rx * R, c.ry * R, pal, c.z);
  }

  // Outer silhouette dark edge — pixel bumps, NOT a flat stroke ring
  const edgePts = 24;
  ctx.fillStyle = pal.rim;
  for (let i = 0; i < edgePts; i++) {
    const a = (i / edgePts) * 6.283;
    let best = clumps[0], bestD = -1;
    for (const c of clumps) {
      const dx = Math.cos(a) - c.ox, dy = Math.sin(a) * 0.85 - c.oy;
      const d = c.rx * c.rx - dx * dx - dy * dy;
      if (d > bestD) { bestD = d; best = c; }
    }
    const ex = ax + Math.cos(a) * best.rx * R * 0.98 + best.ox * R;
    const ey = ay + Math.sin(a) * best.ry * R * 0.82 + best.oy * R;
    ctx.beginPath();
    ctx.arc(ex, ey, 2.2, 0, 7);
    ctx.fill();
  }
}

function drawRain() {
  if (!rain) return;
  ctx.strokeStyle = "rgba(200,210,230,.55)";
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 80; i++) {
    const x = (i * 137 + Date.now() * 0.04) % W;
    const y = (i * 89 + Date.now() * 0.18) % H;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x - 4, y + 10); ctx.stroke();
  }
}

function drawCarRef() {
  const cx = 480, cy = 370;
  ctx.fillStyle = mode === "night" ? "#888" : "#b0b0b8";
  ctx.fillRect(cx - 10, cy - 22, 20, 44);
  ctx.fillStyle = mode === "night" ? "#f44" : "#e03030";
  ctx.fillRect(cx - 8, cy + 14, 6, 4);
  ctx.fillRect(cx + 2, cy + 14, 6, 4);
  ctx.fillStyle = "#fff8";
  ctx.fillRect(cx - 8, cy - 20, 6, 4);
  ctx.fillRect(cx + 2, cy - 20, 6, 4);
}

function draw() {
  drawGrass();
  drawTrunk(TREE);
  drawCanopyV2(TREE);
  drawCarRef();
  drawRain();

  ctx.fillStyle = mode === "night" ? "rgba(255,255,255,.55)" : "rgba(0,0,0,.4)";
  ctx.font = "bold 12px monospace";
  ctx.fillText("deciduous_v2 — prototyp Chrono Trigger", 12, H - 14);
}

function loop() { draw(); requestAnimationFrame(loop); }

cv.addEventListener("click", e => {
  const r = cv.getBoundingClientRect();
  cam.x = (e.clientX - r.left) * (W / r.width);
  cam.y = (e.clientY - r.top) * (H / r.height);
});

function setMode(m) {
  mode = m; rain = m === "rain";
  document.querySelectorAll(".btns button").forEach(b => b.classList.remove("active"));
  const id = m === "night" ? "bNight" : m === "rain" ? "bRain" : "bDay";
  document.getElementById(id).classList.add("active");
}
document.getElementById("bDay").onclick = () => setMode("day");
document.getElementById("bNight").onclick = () => setMode("night");
document.getElementById("bRain").onclick = () => setMode("rain");
document.getElementById("bReset").onclick = () => { cam.x = 320; cam.y = 310; };
setMode(mode);

loop();
</script>
</body>
</html>
